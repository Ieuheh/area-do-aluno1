<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riqueza, Renda e Inteligência Financeira — Área do Aluno</title>
<style>
  :root{
    --navy:#0B2545; --navy-dark:#071830; --navy-mid:#12315c1;
    --gold:#C9A227; --gold-dark:#8A6A16; --gold-bg:#FBF1D9;
    --navy-bg:#E8EEF5; --teal:#12786E; --teal-bg:#DFF3F0;
    --orange:#B5560A; --orange-bg:#FBEADD; --cream:#F8F6F1;
    --ink:#1A1A1A; --muted:#5B6470; --line:#E4E1D8;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Georgia',serif;background:var(--cream);color:var(--ink);}
  #app{display:flex;min-height:100vh;}

  /* ---- Sidebar ---- */
  #sidebar{
    width:300px;flex-shrink:0;background:var(--navy-dark);color:#fff;
    padding:22px 16px;overflow-y:auto;max-height:100vh;position:sticky;top:0;
  }
  #sidebar .brand{font-family:Georgia,serif;font-weight:700;font-size:15px;letter-spacing:.5px;
    color:var(--gold);text-transform:uppercase;margin-bottom:4px;}
  #sidebar .brand-sub{font-size:20px;font-weight:700;margin-bottom:18px;line-height:1.25;}
  #progress-wrap{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;margin-bottom:18px;}
  #progress-label{font-family:Arial,sans-serif;font-size:11px;color:#C9D2DE;margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase;}
  #progress-bar-bg{background:rgba(255,255,255,.15);border-radius:5px;height:8px;overflow:hidden;}
  #progress-bar-fill{background:var(--gold);height:100%;width:0%;transition:width .4s ease;}
  #progress-pct{font-family:Arial,sans-serif;font-size:12px;color:#fff;margin-top:6px;text-align:right;}

  .bloco-group{margin-bottom:6px;}
  .bloco-title{
    display:flex;align-items:center;gap:8px;font-family:Arial,sans-serif;font-size:12px;font-weight:700;
    text-transform:uppercase;letter-spacing:.4px;color:var(--gold);padding:10px 6px 6px;cursor:pointer;
  }
  .bloco-title svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:1.6;flex-shrink:0;}
  .mod-item{
    display:flex;align-items:center;justify-content:space-between;gap:8px;font-family:Arial,sans-serif;font-size:13.5px;
    padding:8px 10px 8px 26px;border-radius:6px;cursor:pointer;color:#D7DEE8;margin-bottom:2px;
  }
  .mod-item:hover{background:rgba(255,255,255,.06);}
  .mod-item.active{background:var(--gold);color:var(--navy-dark);font-weight:700;}
  .mod-dot{width:7px;height:7px;border-radius:50%;background:#3d5170;flex-shrink:0;}
  .mod-item.active .mod-dot{background:var(--navy-dark);}
  .mod-dot.done{background:var(--teal);}
  .mod-item.active .mod-dot.done{background:var(--navy-dark);}

  /* ---- Main content ---- */
  #content{flex:1;padding:44px 56px;max-width:900px;}
  .content-inner{animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .eyebrow{font-family:Arial,sans-serif;font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--gold-dark);font-weight:700;margin-bottom:6px;}
  h1.mod-h{font-size:30px;color:var(--navy);margin:0 0 18px;line-height:1.25;}
  h2.lesson-h{font-size:19px;color:var(--gold-dark);margin:26px 0 8px;}
  p.body-p{font-size:15.5px;line-height:1.7;margin:0 0 12px;color:#26282c;}
  p.body-p strong{color:var(--navy);}

  .box{border-radius:10px;padding:16px 18px;margin:18px 0;border-left:5px solid;}
  .box-label{font-family:Arial,sans-serif;font-size:12.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .box p{margin:0 0 8px;font-size:15px;line-height:1.65;}
  .box.gold{background:var(--gold-bg);border-color:var(--gold-dark);} .box.gold .box-label{color:var(--gold-dark);}
  .box.navy{background:var(--navy-bg);border-color:var(--navy);} .box.navy .box-label{color:var(--navy);}
  .box.teal{background:var(--teal-bg);border-color:var(--teal);} .box.teal .box-label{color:var(--teal);}
  .box.orange{background:var(--orange-bg);border-color:var(--orange);} .box.orange .box-label{color:var(--orange);}

  .q-item{margin-bottom:14px;}
  .q-item:last-child{margin-bottom:0;}
  .q-text{font-family:Arial,sans-serif;font-size:14.5px;font-weight:600;color:#26282c;margin-bottom:6px;}
  textarea.answer{
    width:100%;min-height:52px;resize:vertical;border:1px solid var(--line);border-radius:7px;
    padding:9px 11px;font-family:Arial,sans-serif;font-size:14px;color:var(--ink);background:#fff;
  }
  textarea.answer:focus{outline:none;border-color:var(--gold-dark);box-shadow:0 0 0 3px rgba(201,162,39,.15);}

  .chk-item{display:flex;align-items:flex-start;gap:10px;font-family:Arial,sans-serif;font-size:14.5px;margin-bottom:10px;cursor:pointer;color:#26282c;}
  .chk-item input{margin-top:3px;width:16px;height:16px;accent-color:var(--teal);cursor:pointer;flex-shrink:0;}
  .chk-item.checked span{text-decoration:line-through;color:var(--muted);}

  table.gloss{width:100%;border-collapse:collapse;margin-top:8px;font-family:Arial,sans-serif;font-size:13.5px;}
  table.gloss th{background:var(--navy);color:#fff;text-align:left;padding:8px 10px;}
  table.gloss td{padding:8px 10px;border-bottom:1px solid var(--line);}
  table.gloss tr:nth-child(even) td{background:var(--gold-bg);}

  .save-status{font-family:Arial,sans-serif;font-size:11.5px;color:var(--teal);opacity:0;transition:opacity .3s;margin-left:6px;}
  .save-status.show{opacity:1;}

  .nav-btns{display:flex;justify-content:space-between;margin-top:36px;padding-top:20px;border-top:1px solid var(--line);}
  .nav-btn{font-family:Arial,sans-serif;font-size:13.5px;font-weight:700;padding:10px 16px;border-radius:7px;
    border:1px solid var(--navy);background:#fff;color:var(--navy);cursor:pointer;}
  .nav-btn:hover{background:var(--navy);color:#fff;}
  .nav-btn:disabled{opacity:.35;cursor:default;}
  .nav-btn:disabled:hover{background:#fff;color:var(--navy);}

  #mobile-toggle{display:none;}
  @media (max-width:820px){
    #app{flex-direction:column;}
    #sidebar{width:100%;max-height:none;position:relative;height:auto;}
    #content{padding:28px 20px;}
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">Curso completo</div>
    <div class="brand-sub">Riqueza, Renda e<br>Inteligência Financeira</div>
    <div id="progress-wrap">
      <div id="progress-label">Seu progresso</div>
      <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
      <div id="progress-pct">0%</div>
    </div>
    <nav id="nav-list"></nav>
  </aside>
  <main id="content"><div class="content-inner" id="content-inner"></div></main>
</div>

<script id="course-data" type="application/json">[{"id": "b0", "title": "BLOCO 1 — FUNDAÇÃO MENTAL", "modulos": [{"id": "b0_m0", "title": "MÓDULO 1 — MENTALIDADE FINANCEIRA", "objetivo": "entender que dinheiro é, antes de tudo, um jogo mental — e que sua relação com ele determina seus resultados antes mesmo de qualquer técnica.", "lessons": [{"title": "1.1 O que realmente é dinheiro", "body": ["Dinheiro não é papel nem número na tela. É um **sistema de troca de valor**: uma forma de armazenar e transportar o valor que você (ou alguém) criou para outra pessoa, para poder trocar depois por outra coisa. Ninguém te ensinou isso na escola porque a escola foi desenhada para formar funcionários, não criadores de valor.", "*Analogia:* pense em dinheiro como \"pontos\" em um jogo gigante de trocas. Quem entende as regras do jogo, ganha mais pontos. Quem não entende, fica só jogando os pontos fora."]}, {"title": "1.2 Mentalidade de pobreza vs. mentalidade de riqueza", "body": ["Não é sobre quanto você tem — é sobre como você pensa sobre o que tem.", "- Mentalidade de pobreza: dinheiro é escasso, arriscar é perigoso, \"gente como eu não enriquece\".", "- Mentalidade de riqueza: dinheiro é criado por valor, risco calculado é ferramenta, \"eu posso aprender a fazer isso\".", "*Exemplo real:* duas pessoas recebem R$ 5.000 de bônus. Uma compra um celular novo. A outra investe em um curso que dobra sua capacidade de gerar renda. Seis meses depois, a diferença entre as duas não é o bônus — é a decisão."]}, {"title": "1.3 Crenças limitantes sobre dinheiro", "body": ["Frases como \"dinheiro não traz felicidade\", \"rico é ganancioso\", \"não nasci pra isso\" são **crenças herdadas**, não verdades. Elas foram absorvidas da família, da cultura, da mídia — e funcionam como um teto invisível.", "*Exercício de identificação:* escreva as 5 primeiras frases sobre dinheiro que vêm à sua cabeça quando pensa em \"ficar rico\". Depois pergunte: essa frase é um fato ou uma crença que aprendi?"]}, {"title": "1.4 Escassez vs. abundância", "body": ["Escassez: \"se alguém ganha, eu perco\" (jogo de soma zero).", "Abundância: \"valor pode ser criado, o bolo pode crescer\" (jogo de soma positiva).", "A economia moderna, majoritariamente, é um jogo de soma positiva: novas empresas, produtos e serviços criam riqueza nova — não apenas redistribuem a existente."]}, {"title": "1.5 Responsabilidade radical", "body": ["Culpar o governo, a sorte ou os pais é confortável, mas te tira o controle. Responsabilidade radical não é \"a culpa é sua\" — é \"o controle é seu\". Você não escolheu onde nasceu, mas escolhe o que faz a partir de agora."]}, {"title": "1.6 Definindo sua relação pessoal com dinheiro", "body": ["Feche o módulo respondendo: o que dinheiro significa pra mim? Segurança? Liberdade? Status? Não existe resposta errada — mas existe resposta inconsciente, que sabota, e resposta consciente, que direciona."]}], "estudo_caso": "Duas irmãs cresceram na mesma casa, com os mesmos pais, mesma renda familiar. Uma internalizou \"dinheiro é perigoso, guarde tudo\". A outra internalizou \"dinheiro é ferramenta, use com inteligência\". Vinte anos depois, patrimônios completamente diferentes — mesma origem, mentalidades opostas.", "exercicios": ["Liste 5 crenças suas sobre dinheiro (boas e ruins).", "Para cada uma, escreva de onde ela provavelmente veio.", "Reescreva as 3 mais limitantes em uma versão mais útil.", "Descreva, em 3 frases, o que \"liberdade financeira\" significa pra você especificamente."], "checklist": ["Identifiquei minhas crenças sobre dinheiro", "Entendi a diferença entre mentalidade de escassez e abundância", "Assumi responsabilidade radical pela minha situação financeira", "Escrevi minha definição pessoal de liberdade financeira"], "resumo": "Dinheiro é um jogo de criação e troca de valor. Sua mentalidade — não sua origem — é o maior fator no seu resultado financeiro no longo prazo.", "desafio_label": "Desafio semanal", "desafio": "Durante 7 dias, toda vez que pensar algo negativo sobre dinheiro, anote a frase e reescreva-a de forma mais útil.", "perguntas_label": "Perguntas de reflexão", "perguntas": ["Que crença sobre dinheiro eu herdei sem nunca ter questionado?", "Se eu realmente acreditasse que posso criar valor, o que eu faria diferente amanhã?"], "glossario": [{"term": "Mentalidade de escassez", "def": "crença de que os recursos são limitados e fixos."}, {"term": "Jogo de soma positiva", "def": "situação onde é possível todos ganharem, pois valor novo é criado."}]}, {"id": "b0_m1", "title": "MÓDULO 2 — COMO FUNCIONA O DINHEIRO", "objetivo": "entender a mecânica real do dinheiro — de onde vem, como circula, e por que ele perde valor com o tempo.", "lessons": [{"title": "2.1 A história do dinheiro", "body": ["Escambo (troca direta) → moedas de metal → papel-moeda lastreado em ouro → moeda fiduciária (sem lastro, baseada em confiança) → dinheiro digital. Cada etapa resolveu um problema da anterior: o escambo exigia \"coincidência dupla de desejos\" (eu tenho o que você quer, e vice-versa); a moeda resolveu isso virando um intermediário universal."]}, {"title": "2.2 Como o dinheiro é criado e circula", "body": ["Bancos centrais controlam a oferta de moeda; bancos comerciais \"criam\" dinheiro via crédito (quando emprestam, mais dinheiro circula na economia do que existe fisicamente). Entender isso explica por que crédito farto costuma vir acompanhado de inflação."]}, {"title": "2.3 Inflação: o imposto invisível", "body": ["Se seu dinheiro parado no colchão perde poder de compra todo ano, é como se o governo cobrasse um imposto silencioso sobre quem não investe.", "*Exemplo:* R$ 10.000 parados por 10 anos, com inflação média de 5% ao ano, compram muito menos no fim do período — mesmo sendo \"os mesmos R$ 10.000\"."]}, {"title": "2.4 Ativos vs. passivos — o conceito mais importante do curso", "body": ["**Ativo:** coloca dinheiro no seu bolso (investimento, negócio, propriedade que gera renda).", "**Passivo:** tira dinheiro do seu bolso (carro que só gera despesa, dívida de consumo, assinatura não usada).", "A pergunta que separa quem enriquece de quem não enriquece: \"isso que estou comprando é ativo ou passivo?\""]}, {"title": "2.5 Fluxo de caixa pessoal", "body": ["Fluxo de caixa é simplesmente: quanto entra menos quanto sai, todo mês. Parece óbvio, mas a maioria das pessoas nunca calculou o próprio fluxo de caixa de forma honesta."]}, {"title": "2.6 Dinheiro como ferramenta", "body": ["Dinheiro não é o objetivo final — é o meio para comprar tempo, opções e tranquilidade. Tratá-lo como ferramenta, e não como identidade, muda completamente as decisões que você toma com ele."]}], "estudo_caso": "Um trabalhador CLT com salário alto, mas 100% dele em passivos (carro financiado, cartão no limite), tem patrimônio líquido menor que um autônomo com renda menor, mas que investe parte em ativos todo mês.", "exercicios": ["Liste tudo que você comprou nos últimos 3 meses e classifique como ativo ou passivo.", "Calcule seu fluxo de caixa real do mês passado (entradas - saídas).", "Escreva uma compra recente que, olhando agora, foi puro passivo disfarçado de necessidade."], "checklist": ["Sei a diferença prática entre ativo e passivo", "Calculei meu fluxo de caixa do último mês", "Entendo por que inflação corrói dinheiro parado"], "resumo": "Dinheiro circula através de crédito e é corroído pela inflação. Ativos constroem riqueza; passivos drenam ela. Fluxo de caixa é a base de qualquer decisão financeira.", "desafio_label": "Desafio semanal", "desafio": "Anote todas as suas despesas por 7 dias sem exceção, depois classifique cada uma.", "perguntas_label": "Perguntas de reflexão", "perguntas": ["Dos meus gastos fixos, quantos são realmente ativos?", "O que eu compraria diferente se sempre me perguntasse \"ativo ou passivo\" antes?"], "glossario": [{"term": "Ativo", "def": "algo que gera renda ou valorização."}, {"term": "Passivo", "def": "algo que gera despesa."}, {"term": "Fluxo de caixa", "def": "diferença entre entradas e saídas de dinheiro em um período."}]}, {"id": "b0_m2", "title": "MÓDULO 3 — ECONOMIA EXPLICADA DE FORMA SIMPLES", "objetivo": "entender os mecanismos econômicos que afetam seu dinheiro sem precisar de um diploma em economia.", "lessons": [{"title": "3.1 Oferta e demanda no dia a dia", "body": ["Quando algo é escasso e desejado, o preço sobe. Quando é abundante ou pouco desejado, o preço cai. Isso explica desde o preço da gasolina até o seu próprio salário: sua \"oferta\" (quantas pessoas fazem o que você faz) e \"demanda\" (quantas empresas precisam disso) definem quanto você vale no mercado."]}, {"title": "3.2 Juros: a seu favor ou contra você", "body": ["Juros compostos trabalham a seu favor quando você investe, e contra você quando você deve. É a mesma matemática, em direções opostas — por isso dívida de cartão de crédito e investimento de longo prazo são \"gêmeos\" com efeitos opostos."]}, {"title": "3.3 Ciclos econômicos", "body": ["Economias sobem (expansão) e descem (recessão) em ciclos. Quem entende isso não entra em pânico nas quedas nem se ilude nas altas — planeja para os dois cenários."]}, {"title": "3.4 Como governo e bancos centrais afetam seu bolso", "body": ["Taxa de juros básica (como a Selic no Brasil) influencia o custo do crédito, o rendimento da poupança e investimentos, e até o emprego. Quando a taxa sobe, crédito fica mais caro e investir em renda fixa fica mais atrativo; quando cai, o oposto."]}, {"title": "3.5 Economia comportamental", "body": ["Pessoas não são 100% racionais com dinheiro. Vieses como \"custo afundado\" (continuar investindo em algo ruim só porque já investiu) e \"desconto hiperbólico\" (preferir prazer imediato a benefício maior no futuro) explicam grande parte das decisões financeiras ruins."]}], "estudo_caso": "Durante períodos de juros altos, quem tinha dívidas de cartão viu o problema explodir; quem tinha dinheiro em renda fixa viu o rendimento crescer. Mesma economia, resultados opostos, dependendo de em que lado da equação você estava.", "exercicios": ["Explique com suas palavras, para uma criança, o que é inflação.", "Identifique um viés comportamental que você já cometeu com dinheiro.", "Pesquise a taxa de juros básica atual do seu país e explique o que ela significa na prática."], "checklist": ["Entendo oferta e demanda aplicada ao meu próprio valor de mercado", "Sei como juros compostos afetam dívidas e investimentos", "Reconheço pelo menos um viés comportamental meu"], "resumo": "Economia não é abstrata — ela define o custo do seu crédito, o valor do seu trabalho e o comportamento do seu dinheiro no tempo.", "desafio_label": "Desafio semanal", "desafio": "Acompanhe notícias econômicas por uma semana e escreva como cada uma pode te afetar pessoalmente.", "perguntas_label": "Perguntas de reflexão", "perguntas": ["Minha \"oferta\" no mercado de trabalho é rara ou abundante?", "Que viés comportamental mais me prejudica financeiramente?"], "glossario": [{"term": "Juros compostos", "def": "juros sobre juros, que aceleram exponencialmente com o tempo."}, {"term": "Custo afundado", "def": "dinheiro/tempo já gasto que não deveria influenciar decisões futuras, mas influencia."}]}, {"id": "b0_m3", "title": "MÓDULO 4 — MODELOS MENTAIS DAS PESSOAS RICAS", "objetivo": "aprender os padrões de pensamento repetidos entre pessoas que constroem riqueza de forma consistente.", "lessons": [{"title": "4.1 Pensamento em alavancagem", "body": ["Alavancagem é multiplicar o resultado do seu esforço sem multiplicar o esforço na mesma proporção. Tipos: capital (dinheiro trabalhando por você), pessoas (equipe/terceirização), código/produto (algo que você cria uma vez e vende infinitas vezes), mídia (audiência que amplifica sua mensagem)."]}, {"title": "4.2 Jogos de soma positiva vs. soma zero", "body": ["Negociar salário com o chefe é, em geral, soma zero (o que você ganha, a empresa \"perde\"). Criar um produto que resolve um problema real é soma positiva (você ganha, o cliente ganha, o mercado cresce). Pessoas ricas buscam mais jogos de soma positiva."]}, {"title": "4.3 Assimetria: risco limitado, ganho ilimitado", "body": ["Apostar tudo em algo com risco alto de perda total é o oposto de inteligência financeira. O ideal é buscar apostas onde o pior cenário é administrável e o melhor cenário é desproporcionalmente maior.", "*Exemplo:* criar um produto digital com baixo custo de teste, mas potencial de escalar para milhares de vendas, é uma aposta assimétrica."]}, {"title": "4.4 Paciência composta", "body": ["Assim como dinheiro, habilidade e reputação também compõem com o tempo. Quem entende isso joga o jogo de longo prazo — e colhe resultados desproporcionais depois de anos de consistência aparentemente \"lenta\"."]}, {"title": "4.5 Como pessoas ricas tomam decisões", "body": ["Padrões comuns: decidem rápido em coisas reversíveis, decidem devagar em coisas irreversíveis; preferem clareza a conforto; tratam erros como dado, não como identidade."]}], "estudo_caso": "Duas pessoas com a mesma ideia de negócio: uma espera \"o momento perfeito\" por anos; a outra testa uma versão simples em semanas, erra, ajusta, e aprende compondo experiência real. A segunda, mesmo com mais erros visíveis, chega à riqueza primeiro.", "exercicios": ["Liste 3 formas de alavancagem que você já pode usar hoje, mesmo com poucos recursos.", "Descreva uma decisão financeira que você tratou como soma zero, mas que poderia ser soma positiva.", "Identifique uma aposta assimétrica que você poderia testar com baixo risco."], "checklist": ["Entendo os 4 tipos de alavancagem", "Sei diferenciar apostas simétricas de assimétricas", "Identifiquei um jogo de soma positiva que posso jogar"], "resumo": "Riqueza consistente vem de alavancagem, apostas assimétricas, paciência composta e decisões rápidas em situações reversíveis.", "desafio_label": "Desafio semanal", "desafio": "Escolha uma habilidade sua e planeje como transformá-la em algo alavancado (produto, conteúdo, sistema).", "perguntas_label": "Perguntas de reflexão", "perguntas": ["Em que área da minha vida estou jogando soma zero sem perceber?", "Que aposta assimétrica de baixo risco eu poderia testar este mês?"], "glossario": [{"term": "Alavancagem", "def": "multiplicar resultado sem multiplicar esforço na mesma proporção."}, {"term": "Aposta assimétrica", "def": "risco limitado com potencial de ganho desproporcional."}]}]}, {"id": "b1", "title": "BLOCO 2 — CRIAÇÃO DE VALOR E RENDA", "modulos": [{"id": "b1_m0", "title": "MÓDULO 5 — COMO CRIAR VALOR", "objetivo": "entender que toda renda nasce da resolução de um problema real para alguém.", "lessons": [{"title": "5.1 A equação do valor", "body": ["Valor percebido = (resultado dos sonhos × probabilidade percebida de sucesso) ÷ (tempo até o resultado × esforço/sacrifício envolvido). Quanto mais você aumenta o numerador (resultado, confiança) e reduz o denominador (tempo, esforço), mais valioso seu produto ou serviço parece."]}, {"title": "5.2 Resolver problemas como fonte de toda renda", "body": ["Ninguém paga por produtos — paga por soluções. Um remédio não vende \"comprimido\", vende \"fim da dor\". Antes de pensar em \"como ganhar dinheiro\", pergunte: \"que problema doloroso eu consigo resolver melhor que a média?\""]}, {"title": "5.3 Habilidades que se transformam em dinheiro", "body": ["Praticamente qualquer habilidade tem um mercado: escrever, organizar, ensinar, vender, programar, editar, analisar. O segredo não é ter a habilidade \"perfeita\", é conectar a habilidade que você já tem a um problema que alguém paga para resolver."]}, {"title": "5.4 Como identificar oportunidades no mercado", "body": ["Procure por: reclamações repetidas em comunidades online, tarefas que as pessoas pagam para não fazer, processos lentos ou caros que podem ser simplificados."]}, {"title": "5.5 Validando uma ideia antes de investir tempo", "body": ["Antes de construir algo grande, teste pequeno: converse com potenciais clientes, ofereça uma versão simplificada, veja se alguém pagaria antes de você gastar meses construindo."]}], "estudo_caso": "Um profissional percebeu que colegas perdiam horas organizando planilhas financeiras manualmente. Criou um template simples e vendeu por um valor baixo — validando a ideia antes de construir uma ferramenta completa.", "exercicios": ["Liste 3 problemas que você mesmo já teve e pagaria para resolver.", "Liste 3 habilidades suas que poderiam resolver problemas de outras pessoas.", "Descreva como testaria uma dessas ideias em uma semana, gastando o mínimo possível."], "checklist": ["Entendo a equação do valor percebido", "Identifiquei problemas reais que posso resolver", "Sei como validar uma ideia antes de escalar"], "resumo": "Toda renda nasce de resolver um problema real. Antes de construir, valide; antes de validar, identifique problemas de verdade.", "desafio_label": "Desafio semanal", "desafio": "Converse com 5 pessoas sobre um problema que você acha que pode resolver, e anote as reações reais delas.", "perguntas_label": "Perguntas de reflexão", "perguntas": ["Que problema eu resolvo naturalmente, sem nem perceber que é valioso?", "Estou tentando validar ideias, ou apenas construindo no escuro?"], "glossario": [{"term": "Validação", "def": "testar se existe demanda real antes de investir tempo/dinheiro em construir algo completo."}]}, {"id": "b1_m1", "title": "MÓDULO 6 — COMO GANHAR DINHEIRO NA INTERNET", "objetivo": "ter um panorama honesto e realista das formas legítimas de gerar renda online.", "lessons": [{"title": "6.1 Panorama honesto", "body": ["Não existe \"clique aqui e fique rico\". O que existe são modelos de negócio reais, que exigem tempo para funcionar, mas que têm alavancagem muito maior que negócios tradicionais."]}, {"title": "6.2 Modelos de renda online", "body": ["- **Serviços:** freelancing, consultoria (troca tempo por dinheiro, mas com alcance global).", "- **Produtos digitais:** cursos, ebooks, templates (escala sem limite de tempo).", "- **Mídia/conteúdo:** audiência monetizada por anúncios, patrocínios, produtos próprios.", "- **Comércio:** venda de produtos físicos ou digitais online."]}, {"title": "6.3 Escolhendo seu primeiro modelo", "body": ["Se você tem pouco tempo e quer renda rápida: serviços. Se tem uma habilidade replicável e quer escalar: produtos digitais. Se gosta de criar conteúdo consistente: mídia/audiência."]}, {"title": "6.4 Primeiros passos práticos", "body": ["Comece pequeno, sem precisar de capital: ofereça um serviço para o primeiro cliente, escreva o primeiro conteúdo, teste a primeira oferta simples — o objetivo inicial é aprender o jogo, não ficar rico no primeiro mês."]}], "estudo_caso": "Uma pessoa desempregada começou oferecendo edição de currículos para conhecidos por um valor simbólico. Em meses, formalizou o serviço, criou um site simples, e hoje atende clientes de várias cidades — sem nunca ter \"investido\" além do próprio tempo.", "exercicios": ["Qual dos 4 modelos (serviço, produto, mídia, comércio) combina mais com seu momento atual?", "Descreva o primeiro passo prático que você daria nesse modelo esta semana."], "checklist": ["Entendo os 4 modelos principais de renda online", "Escolhi um modelo inicial alinhado ao meu perfil", "Defini meu primeiro passo prático"], "resumo": "Ganhar dinheiro online é sobre modelos de negócio reais, não sobre atalhos. Escolha um modelo alinhado ao seu momento e comece pequeno.", "desafio_label": "Desafio semanal", "desafio": "Dê o primeiro passo prático definido no exercício, ainda que pequeno, esta semana.", "perguntas_label": "Perguntas de reflexão", "perguntas": ["O que está me impedindo de começar hoje, mesmo pequeno?", "Que crença do Módulo 1 pode estar sabotando esse início?"], "glossario": []}, {"id": "b1_m2", "title": "MÓDULO 7 — NEGÓCIOS DIGITAIS", "objetivo": "entender a estrutura básica de um negócio digital funcional.", "lessons": [{"title": "7.1 Anatomia de um negócio digital", "body": ["Todo negócio digital tem: uma oferta (o que resolve), um público (quem tem o problema), um canal de aquisição (como as pessoas chegam até você) e um sistema de entrega (como você cumpre a promessa)."]}, {"title": "7.2 Nichos e posicionamento", "body": ["Quanto mais específico o nicho, mais fácil se destacar e cobrar mais. \"Marketing para dentistas\" vence \"marketing para empresas\" na cabeça do cliente certo."]}, {"title": "7.3 Modelos de monetização", "body": ["Assinatura (receita recorrente), venda única de produto, serviço por projeto, comissão de afiliados. Cada um tem prós e contras de previsibilidade e esforço."]}, {"title": "7.4 Estrutura mínima viável", "body": ["Você não precisa de site perfeito, marca completa e equipe antes de vender. Precisa de uma oferta clara, um jeito de receber pagamento e um jeito de entregar."]}, {"title": "7.5 Estudo de caso: do zero ao primeiro cliente", "body": ["Um profissional de marketing sem clientes criou uma oferta simples (\"vou auditar seu Instagram em 48h por X\"), postou em 3 grupos, e fechou o primeiro cliente em uma semana — sem site, sem logo, sem CNPJ ainda."]}], "estudo_caso": "", "exercicios": ["Defina, em uma frase, sua oferta inicial (o que você resolve, para quem).", "Escolha um modelo de monetização inicial e justifique.", "Liste o mínimo necessário para você conseguir seu primeiro cliente esta semana."], "checklist": ["Tenho uma oferta clara em uma frase", "Escolhi um modelo de monetização inicial", "Sei exatamente o mínimo necessário para vender"], "resumo": "Um negócio digital não precisa ser complexo para começar — precisa de oferta clara, público definido e forma de entrega.", "desafio_label": "Desafio semanal", "desafio": "Escreva sua oferta em uma frase e compartilhe com 3 pessoas para testar a reação.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b1_m3", "title": "MÓDULO 8 — FREELANCING", "objetivo": "aprender a iniciar, precificar e crescer como freelancer.", "lessons": [{"title": "8.1 Como iniciar sem experiência", "body": ["Ofereça um preço de entrada mais baixo para os primeiros 2-3 clientes em troca de portfólio e depoimentos — não para sempre, apenas para gerar prova social inicial."]}, {"title": "8.2 Precificando seu trabalho", "body": ["Não cobre só pelo tempo — cobre pelo resultado que você entrega. Pesquise o mercado, calcule seu custo de vida e defina um preço que sustente seu negócio, não só sua sobrevivência."]}, {"title": "8.3 Onde encontrar clientes", "body": ["Plataformas de freelance, prospecção direta (mensagem para empresas/pessoas que podem precisar), indicações de clientes satisfeitos, conteúdo mostrando seu trabalho."]}, {"title": "8.4 Transformando freelance em agência ou produto", "body": ["Quando você tem demanda maior que sua capacidade, duas saídas: contratar/terceirizar (agência) ou transformar seu processo em produto replicável (template, curso, ferramenta)."]}], "estudo_caso": "Um freelancer de design começou cobrando pouco, ganhou 3 depoimentos fortes, dobrou o preço, e em um ano estava selecionando clientes em vez de correr atrás deles.", "exercicios": ["Calcule seu custo de vida mensal mínimo e defina quanto precisa faturar.", "Escreva uma mensagem de prospecção direta para um cliente ideal.", "Liste 3 lugares onde seu cliente ideal está presente."], "checklist": ["Sei precificar com base em resultado, não só tempo", "Tenho uma mensagem de prospecção pronta", "Identifiquei onde encontrar clientes"], "resumo": "Freelancing é um ótimo ponto de entrada — mas o objetivo é evoluir de \"vender tempo\" para \"vender resultado e sistema\".", "desafio_label": "Desafio semanal", "desafio": "Envie a mensagem de prospecção para 10 clientes potenciais esta semana.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b1_m4", "title": "MÓDULO 9 — CRIAÇÃO DE PRODUTOS DIGITAIS", "objetivo": "aprender a transformar conhecimento ou habilidade em um produto digital vendável.", "lessons": [{"title": "9.1 Tipos de produtos digitais", "body": ["Curso, ebook, template, planilha, comunidade paga, software (SaaS). Cada um exige nível diferente de complexidade técnica e investimento inicial."]}, {"title": "9.2 Do problema à oferta", "body": ["Todo produto digital bom nasce de um problema específico e doloroso, não de \"vou criar um curso sobre o que eu sei\". Comece do problema do cliente, não do seu conhecimento."]}, {"title": "9.3 Criando um MVP", "body": ["MVP (produto mínimo viável) é a versão mais simples possível que já resolve o problema central — sem enfeites. Lance rápido, colete feedback real, melhore depois."]}, {"title": "9.4 Precificação e posicionamento", "body": ["Produtos digitais podem ser precificados por valor entregue, não por horas de produção. Um ebook que economiza 40h de trabalho do cliente vale mais que seu \"custo de produção\"."]}], "estudo_caso": "Uma pessoa criou uma planilha simples de controle financeiro em uma tarde, vendeu por um preço simbólico em uma rede social, validou a demanda, e só depois investiu em uma versão mais completa.", "exercicios": ["Escolha um problema específico que seu produto resolveria.", "Desenhe a versão MVP mais simples possível desse produto.", "Defina um preço inicial baseado no valor entregue, não no tempo de criação."], "checklist": ["Meu produto nasce de um problema específico", "Tenho uma versão MVP definida", "Precifiquei por valor, não por esforço"], "resumo": "Produtos digitais escalam porque são criados uma vez e vendidos infinitas vezes — desde que resolvam um problema real, validado antes de escalar.", "desafio_label": "Desafio semanal", "desafio": "Esboce o MVP do seu produto digital em uma página só.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}]}, {"id": "b2", "title": "BLOCO 3 — MARKETING, VENDAS E AUDIÊNCIA", "modulos": [{"id": "b2_m0", "title": "MÓDULO 10 — MARKETING DIGITAL", "objetivo": "entender os fundamentos que fazem qualquer estratégia de marketing funcionar.", "lessons": [{"title": "10.1 Fundamentos: atenção, confiança, conversão", "body": ["Todo marketing segue essa sequência: primeiro capturar atenção, depois construir confiança, só então converter em venda. Pular etapas (vender sem confiança) é a razão nº1 de ofertas que não convertem."]}, {"title": "10.2 Funis de vendas", "body": ["Um funil é o caminho que a pessoa percorre desde \"nunca ouviu falar de você\" até \"cliente\". Tipicamente: descoberta → interesse → consideração → decisão → compra → fidelização."]}, {"title": "10.3 Tráfego pago vs. orgânico", "body": ["Pago: resultado mais rápido, mas custa dinheiro e para quando você para de pagar. Orgânico: mais lento para construir, mas compõe com o tempo e cria audiência própria."]}, {"title": "10.4 Métricas essenciais", "body": ["Custo de aquisição de cliente (CAC), taxa de conversão, ticket médio, valor do cliente ao longo do tempo (LTV). Sem medir, você está adivinhando, não decidindo."]}], "estudo_caso": "Um pequeno negócio investia todo orçamento em anúncios sem acompanhar métricas. Ao começar a medir CAC e conversão, descobriu que um canal específico gerava clientes 3x mais baratos — e realocou o orçamento, dobrando o resultado sem gastar mais.", "exercicios": ["Desenhe o funil de vendas do seu negócio (ou de uma ideia de negócio).", "Defina qual métrica você vai acompanhar primeiro e por quê."], "checklist": ["Entendo a sequência atenção → confiança → conversão", "Sei diferenciar tráfego pago de orgânico", "Conheço as métricas essenciais de marketing"], "resumo": "Marketing eficaz constrói confiança antes de vender, e é guiado por métricas — não por intuição.", "desafio_label": "Desafio semanal", "desafio": "Mapeie, em texto, a jornada que um cliente percorreria até comprar de você.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b2_m1", "title": "MÓDULO 11 — COPYWRITING", "objetivo": "aprender a escrever textos que comunicam valor e geram ação.", "lessons": [{"title": "11.1 Estrutura de uma mensagem persuasiva", "body": ["Problema → agitação (mostrar o custo de não resolver) → solução → prova → chamada para ação. Essa estrutura simples sustenta a maioria dos textos de venda eficazes."]}, {"title": "11.2 Gatilhos mentais (uso ético)", "body": ["Escassez real (não fabricada), prova social genuína, autoridade demonstrada (não inventada), urgência honesta. Gatilhos funcionam porque refletem como decisões humanas realmente acontecem — usá-los de forma enganosa destrói confiança no longo prazo."]}, {"title": "11.3 Headlines, bullets e CTAs", "body": ["A headline decide se a pessoa continua lendo. Bullets comunicam benefícios específicos e concretos. O CTA (chamada para ação) precisa ser claro e único — não confundir o leitor com múltiplas opções."]}, {"title": "11.4 Storytelling aplicado a vendas", "body": ["Histórias tornam abstrações memoráveis. Uma história de transformação (antes → durante → depois) comunica valor de forma muito mais persuasiva que uma lista de características técnicas."]}], "estudo_caso": "Uma mesma oferta, anunciada com uma lista técnica de recursos, converteu pouco. Reescrita como uma história de transformação de um cliente real, a conversão mais que dobrou — mesma oferta, comunicação diferente.", "exercicios": ["Escreva uma headline para sua oferta seguindo problema → solução.", "Escreva 3 bullets de benefício específico (não genérico).", "Escreva uma mini-história de transformação de um cliente (real ou hipotético)."], "checklist": ["Sei estruturar uma mensagem persuasiva", "Uso gatilhos mentais de forma ética", "Sei escrever um CTA claro"], "resumo": "Copywriting bom não manipula — comunica valor real de forma clara e emocionalmente relevante.", "desafio_label": "Desafio semanal", "desafio": "Reescreva a descrição de uma oferta sua (ou de um negócio que você admira) usando a estrutura problema-agitação-solução.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b2_m2", "title": "MÓDULO 12 — VENDAS", "objetivo": "entender a psicologia da venda e desenvolver uma abordagem consultiva.", "lessons": [{"title": "12.1 A psicologia por trás de uma decisão de compra", "body": ["Pessoas compram por razões emocionais e justificam com lógica depois. Entender a dor ou desejo real por trás da compra é mais importante que listar características do produto."]}, {"title": "12.2 Vendas consultivas vs. agressivas", "body": ["Vendas agressivas empurram; vendas consultivas diagnosticam o problema do cliente e mostram, com honestidade, se sua solução realmente resolve. Consultiva gera menos vendas no curto prazo, mas muito mais confiança e recompra no longo prazo."]}, {"title": "12.3 Lidando com objeções", "body": ["A maioria das objeções (\"está caro\", \"vou pensar\") são, na verdade, falta de clareza sobre o valor ou medo de tomar a decisão errada — não o preço em si. Responder a objeção real por trás da objeção declarada é a chave."]}, {"title": "12.4 Fechamento e follow-up", "body": ["Fechar não é pressionar — é facilitar a decisão que a pessoa já quer tomar. E a maioria das vendas acontece no follow-up, não no primeiro contato."]}], "estudo_caso": "Um vendedor que apenas \"empurrava\" o produto tinha alta taxa de desistência. Ao adotar uma abordagem consultiva — perguntando antes de apresentar — sua taxa de fechamento triplicou, mesmo vendendo menos ativamente.", "exercicios": ["Liste as 3 objeções mais comuns que você (ou seu negócio) recebe.", "Para cada uma, identifique a objeção real por trás da declarada.", "Escreva uma resposta consultiva (não defensiva) para cada objeção."], "checklist": ["Entendo a diferença entre venda consultiva e agressiva", "Sei identificar a objeção real por trás da declarada", "Tenho um processo de follow-up definido"], "resumo": "Vender bem é diagnosticar e ajudar a decidir — não empurrar. A confiança gerada nesse processo é o que sustenta negócios de longo prazo.", "desafio_label": "Desafio semanal", "desafio": "Pratique a escuta consultiva em uma conversa de venda real esta semana, fazendo mais perguntas do que afirmações.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b2_m3", "title": "MÓDULO 13 — BRANDING", "objetivo": "construir uma marca reconhecível e confiável, além de um logotipo.", "lessons": [{"title": "13.1 O que é uma marca", "body": ["Marca é a percepção que existe na cabeça das pessoas quando pensam em você ou seu negócio — construída por consistência, experiência e reputação, não apenas por design."]}, {"title": "13.2 Posicionamento e diferenciação", "body": ["Posicionamento responde: \"por que escolher você e não o concorrente?\" Sem uma resposta clara, o cliente decide só pelo preço."]}, {"title": "13.3 Consistência visual e verbal", "body": ["Usar o mesmo tom de voz, as mesmas cores e a mesma mensagem central em todos os canais cria reconhecimento — inconsistência gera confusão e desconfiança."]}, {"title": "13.4 Construindo confiança e reputação", "body": ["Reputação se constrói entregando o que promete, de forma repetida, ao longo do tempo — não existe atalho de branding que substitua isso."]}], "estudo_caso": "Duas marcas oferecem o mesmo serviço a preços similares. Uma tem comunicação inconsistente e sem posicionamento claro; a outra é reconhecida por um diferencial específico e mantém consistência visual e de mensagem. A segunda cresce por indicação; a primeira depende só de anúncios.", "exercicios": ["Escreva, em uma frase, seu posicionamento (o que te diferencia).", "Liste 3 elementos que deveriam ser consistentes em todos os seus canais."], "checklist": ["Tenho um posicionamento claro em uma frase", "Sei o que torna minha marca consistente", "Entendo que reputação é construída, não declarada"], "resumo": "Branding forte é posicionamento claro + consistência + entrega repetida da promessa.", "desafio_label": "Desafio semanal", "desafio": "Audite seus canais (redes sociais, site) e anote onde há inconsistência de mensagem ou visual.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b2_m4", "title": "MÓDULO 14 — CONSTRUÇÃO DE AUDIÊNCIA", "objetivo": "entender por que audiência é um dos ativos mais valiosos da era digital e como construí-la.", "lessons": [{"title": "14.1 Por que audiência é o ativo mais valioso", "body": ["Uma audiência própria (lista de e-mail, seguidores engajados) é um canal de distribuição que você controla — diferente de depender só de anúncios pagos ou algoritmos de terceiros."]}, {"title": "14.2 Conteúdo de valor vs. conteúdo de venda", "body": ["A proporção saudável é majoritariamente conteúdo que ajuda de verdade, com uma minoria que vende diretamente. Audiência que só recebe venda se cansa e sai."]}, {"title": "14.3 Frequência, consistência e formatos", "body": ["Publicar pouco e esporadicamente não constrói audiência. Consistência (mesmo que em ritmo modesto, mas constante) supera picos esporádicos de intensidade."]}, {"title": "14.4 De seguidor a cliente", "body": ["A jornada normalmente passa por: descobrir você → seguir → confiar → comprar → indicar. Pular etapas (\"seguir direto para comprar\") raramente funciona em escala."]}], "estudo_caso": "Um criador que publicava esporadicamente, mas viralava às vezes, tinha audiência instável e vendas imprevisíveis. Ao adotar frequência consistente (ainda que menor alcance por post), construiu uma base fiel que sustentou vendas recorrentes.", "exercicios": ["Defina uma frequência de publicação realista para você manter por 90 dias.", "Liste 5 temas de conteúdo de valor (não venda) que você poderia criar."], "checklist": ["Entendo por que audiência própria é um ativo", "Tenho uma proporção definida entre conteúdo de valor e venda", "Defini uma frequência de publicação sustentável"], "resumo": "Audiência é construída com consistência e valor real entregue antes da venda — não com picos esporádicos ou promoção constante.", "desafio_label": "Desafio semanal", "desafio": "Publique conteúdo de valor (não venda) todos os dias por 7 dias, mesmo que simples.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b2_m5", "title": "MÓDULO 15 — REDES SOCIAIS", "objetivo": "usar redes sociais de forma estratégica, entendendo como os algoritmos e a comunidade realmente funcionam.", "lessons": [{"title": "15.1 Escolhendo a rede certa", "body": ["Cada rede social atrai um comportamento e público diferente. Escolha com base em onde seu público-alvo realmente está e em que formato você consegue ser consistente (texto, vídeo curto, vídeo longo, áudio)."]}, {"title": "15.2 Algoritmos: como funcionam de verdade", "body": ["De forma simplificada, algoritmos priorizam conteúdo que mantém as pessoas na plataforma por mais tempo e gera mais interação — não necessariamente o \"melhor\" conteúdo, mas o que gera mais engajamento real."]}, {"title": "15.3 Criando um sistema de conteúdo sustentável", "body": ["Ter um sistema (banco de ideias, dias fixos de gravação/escrita, formato replicável) evita depender de \"inspiração\" para manter consistência."]}, {"title": "15.4 Comunidade vs. audiência passiva", "body": ["Audiência passiva apenas consome; comunidade interage, comenta, participa. Comunidades geram muito mais confiança e conversão que audiências passivas do mesmo tamanho."]}], "estudo_caso": "Um criador com poucos seguidores, mas alta interação e senso de comunidade, vendeu mais que um criador com 10x mais seguidores, mas audiência passiva e desengajada.", "exercicios": ["Escolha a rede social principal onde vai focar e justifique.", "Desenhe um sistema simples de criação de conteúdo (banco de ideias + rotina)."], "checklist": ["Escolhi minha rede social principal com critério", "Entendo como o algoritmo prioriza conteúdo", "Tenho um sistema de criação, não dependo de inspiração"], "resumo": "Redes sociais recompensam consistência e interação real — escolher a rede certa e criar um sistema sustentável importa mais que \"viralizar\" uma vez.", "desafio_label": "Desafio semanal", "desafio": "Monte um banco de 10 ideias de conteúdo para as próximas semanas.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}]}, {"id": "b3", "title": "BLOCO 4 — TECNOLOGIA E PRODUTIVIDADE", "modulos": [{"id": "b3_m0", "title": "MÓDULO 16 — INTELIGÊNCIA ARTIFICIAL PARA GANHAR DINHEIRO", "objetivo": "usar IA como vantagem competitiva real, não como atalho mágico.", "lessons": [{"title": "16.1 Panorama das ferramentas de IA relevantes", "body": ["Ferramentas de texto, imagem, vídeo, áudio e automação já permitem que uma pessoa sozinha produza o que antes exigia uma equipe inteira — desde que saiba usá-las com direção clara."]}, {"title": "16.2 Usando IA para criar produtos e conteúdo", "body": ["IA pode acelerar pesquisa, rascunho, edição e produção — mas a direção estratégica (o que criar, para quem, por quê) continua sendo humana e insubstituível."]}, {"title": "16.3 IA como vantagem competitiva, não atalho mágico", "body": ["Quem usa IA apenas para \"gerar volume\" sem qualidade perde credibilidade rápido. Quem usa IA para fazer mais rápido o que já faria bem, ganha vantagem real."]}, {"title": "16.4 Prompts práticos para negócios e finanças", "body": ["Peça sempre contexto específico (seu público, seu objetivo, restrições) em vez de pedir algo genérico — quanto mais específico o prompt, melhor o resultado."]}], "estudo_caso": "Um pequeno criador de conteúdo usava IA apenas para gerar texto genérico, sem edição — o público percebeu a queda de qualidade e o engajamento caiu. Outro criador usou IA para acelerar pesquisa e rascunho, mas revisava e personalizava tudo — manteve qualidade e ganhou velocidade.", "exercicios": ["Liste 3 tarefas do seu negócio/ideia que a IA poderia acelerar.", "Escreva um prompt específico (com contexto real) para uma dessas tarefas."], "checklist": ["Entendo IA como ferramenta de velocidade, não substituto de estratégia", "Sei escrever prompts específicos e contextualizados", "Identifiquei tarefas do meu negócio que a IA pode acelerar"], "resumo": "IA multiplica a capacidade de quem já tem direção clara — não substitui a falta de estratégia ou qualidade.", "desafio_label": "Desafio semanal", "desafio": "Use IA para acelerar uma tarefa real do seu negócio esta semana, revisando o resultado com cuidado.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b3_m1", "title": "MÓDULO 17 — AUTOMAÇÕES", "objetivo": "identificar o que vale a pena automatizar e como começar.", "lessons": [{"title": "17.1 O que vale a pena automatizar", "body": ["Tarefas repetitivas, baseadas em regras claras, que consomem tempo mas não exigem julgamento humano constante (respostas padrão, organização de dados, agendamentos)."]}, {"title": "17.2 Ferramentas sem código", "body": ["Existem ferramentas que conectam aplicativos diferentes (ex: quando alguém preenche um formulário, enviar automaticamente um e-mail) sem precisar programar."]}, {"title": "17.3 Construindo seu primeiro fluxo automatizado", "body": ["Comece pequeno: automatize uma única tarefa repetitiva que você faz manualmente toda semana, e meça o tempo economizado antes de automatizar mais."]}], "estudo_caso": "Um pequeno negócio gastava horas por semana organizando pedidos manualmente. Uma automação simples, montada em um único fim de semana, eliminou quase todo esse trabalho manual.", "exercicios": ["Liste 3 tarefas repetitivas que você faz manualmente hoje.", "Escolha uma para automatizar primeiro e desenhe o fluxo (gatilho → ação)."], "checklist": ["Sei identificar tarefas automatizáveis", "Conheço a lógica básica de \"gatilho → ação\"", "Escolhi minha primeira automação para implementar"], "resumo": "Automação bem aplicada devolve tempo — o mais valioso dos seus recursos — para atividades que realmente exigem seu julgamento.", "desafio_label": "Desafio semanal", "desafio": "Implemente (ou desenhe detalhadamente) sua primeira automação.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b3_m2", "title": "MÓDULO 18 — PRODUTIVIDADE", "objetivo": "trabalhar com mais foco e menos desgaste, priorizando o que realmente move resultado.", "lessons": [{"title": "18.1 Gestão de energia vs. gestão de tempo", "body": ["Ter tempo livre não adianta se sua energia está esgotada. Identificar seus horários de maior clareza mental e proteger esse tempo para o trabalho mais importante muda tudo."]}, {"title": "18.2 Priorização", "body": ["Nem tudo urgente é importante. Separe tarefas por impacto real no resultado, não apenas por quem está cobrando mais alto."]}, {"title": "18.3 Sistemas de trabalho profundo", "body": ["Blocos de tempo sem interrupção, dedicados a uma única tarefa complexa, produzem resultado muito superior a horas fragmentadas com notificações constantes."]}, {"title": "18.4 Evitando excesso de trabalho sem resultado", "body": ["\"Estar ocupado\" não é o mesmo que \"estar produzindo resultado\". Meça pelo que foi entregue, não pelas horas sentado trabalhando."]}], "estudo_caso": "Duas pessoas trabalham 8 horas por dia. Uma passa o dia fragmentado entre notificações e pequenas tarefas; a outra reserva 2 blocos de foco profundo por dia. A segunda entrega mais valor em menos tempo efetivo de \"trabalho profundo\".", "exercicios": ["Identifique seu horário de maior clareza mental no dia.", "Reserve um bloco de trabalho profundo (mínimo 60 min, sem interrupções) para esta semana."], "checklist": ["Sei diferenciar urgente de importante", "Identifiquei meu horário de maior energia", "Protegi pelo menos um bloco de trabalho profundo"], "resumo": "Produtividade real vem de proteger energia e foco para o que gera resultado — não de estar ocupado o tempo todo.", "desafio_label": "Desafio semanal", "desafio": "Pratique pelo menos 3 blocos de trabalho profundo esta semana, sem notificações.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b3_m3", "title": "MÓDULO 19 — HÁBITOS", "objetivo": "entender como hábitos moldam resultados financeiros no longo prazo.", "lessons": [{"title": "19.1 Como hábitos moldam resultados financeiros", "body": ["Pequenas decisões repetidas diariamente (gastar, poupar, estudar, procrastinar) compõem, ao longo dos anos, para resultados muito maiores que qualquer decisão isolada."]}, {"title": "19.2 O ciclo do hábito", "body": ["Gatilho (o que dispara o comportamento) → rotina (o comportamento em si) → recompensa (o que o cérebro ganha com isso). Mudar um hábito é mais fácil quando você entende esse ciclo, em vez de tentar \"força de vontade pura\"."]}, {"title": "19.3 Construindo hábitos financeiros duradouros", "body": ["Comece pequeno e específico (ex: revisar gastos toda sexta-feira, 10 minutos), e ligue o novo hábito a algo que você já faz consistentemente."]}, {"title": "19.4 Eliminando hábitos que sabotam sua renda", "body": ["Identifique o gatilho por trás do hábito prejudicial (compra por impulso, procrastinação em vender) e substitua a rotina, mantendo a mesma recompensa buscada."]}], "estudo_caso": "Uma pessoa gastava impulsivamente sempre que se sentia estressada (gatilho: estresse; rotina: compra; recompensa: alívio momentâneo). Ao identificar isso, substituiu a rotina (uma caminhada curta) mantendo a mesma recompensa (alívio), sem gastar dinheiro.", "exercicios": ["Identifique um hábito financeiro prejudicial seu e mapeie gatilho → rotina → recompensa.", "Desenhe um hábito financeiro positivo pequeno para começar esta semana."], "checklist": ["Entendo o ciclo gatilho-rotina-recompensa", "Identifiquei um hábito financeiro prejudicial meu", "Defini um hábito financeiro positivo para começar"], "resumo": "Resultados financeiros de longo prazo são a soma de pequenos hábitos repetidos — mudar o ciclo é mais eficaz que depender de força de vontade.", "desafio_label": "Desafio semanal", "desafio": "Pratique o novo hábito financeiro positivo todos os dias desta semana.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}]}, {"id": "b4", "title": "BLOCO 5 — GESTÃO E CONSTRUÇÃO DE PATRIMÔNIO", "modulos": [{"id": "b4_m0", "title": "MÓDULO 20 — PLANEJAMENTO FINANCEIRO", "objetivo": "organizar suas finanças pessoais de forma prática e sustentável.", "lessons": [{"title": "20.1 Organizando suas finanças do zero", "body": ["Liste todas as fontes de renda, todas as despesas fixas e variáveis, e todas as dívidas. Sem esse retrato completo, qualquer planejamento é feito no escuro."]}, {"title": "20.2 Orçamento que funciona na prática", "body": ["Métodos rígidos costumam falhar. Um orçamento simples, com categorias amplas (essenciais, desejos, investimento, dívidas) e revisão mensal, é mais sustentável que planilhas excessivamente detalhadas que ninguém mantém."]}, {"title": "20.3 Reserva de emergência", "body": ["Uma reserva cobrindo de 3 a 6 meses de despesas essenciais, guardada em algo líquido (fácil de resgatar), é o alicerce antes de qualquer investimento de risco."]}, {"title": "20.4 Metas financeiras de curto, médio e longo prazo", "body": ["Curto prazo (meses): reserva de emergência, quitar dívida cara. Médio prazo (1-3 anos): objetivos específicos. Longo prazo (5+ anos): patrimônio e liberdade financeira."]}], "estudo_caso": "Uma pessoa sem reserva de emergência precisou usar cartão de crédito para um imprevisto, entrando em uma espiral de juros altos. Depois de construir uma reserva, o mesmo tipo de imprevisto não gerou nenhuma dívida.", "exercicios": ["Liste todas as suas fontes de renda e despesas do último mês.", "Defina sua meta de reserva de emergência (quantos meses de despesas essenciais).", "Escreva uma meta financeira de curto, uma de médio e uma de longo prazo."], "checklist": ["Tenho um retrato completo da minha situação financeira", "Defini minha meta de reserva de emergência", "Tenho metas de curto, médio e longo prazo definidas"], "resumo": "Planejamento financeiro começa com clareza total da situação atual, seguida de reserva de segurança e metas realistas por prazo.", "desafio_label": "Desafio semanal", "desafio": "Monte seu orçamento simplificado do zero, com as categorias essenciais, desejos, investimento e dívidas.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b4_m1", "title": "MÓDULO 21 — INVESTIMENTOS", "objetivo": "entender os fundamentos de investir antes de escolher onde colocar seu dinheiro.", "lessons": [{"title": "21.1 Fundamentos antes de investir um centavo", "body": ["Nunca invista em algo que você não entende. Antes de qualquer aplicação, entenda: qual o risco, qual a liquidez (facilidade de resgatar) e qual o retorno esperado."]}, {"title": "21.2 Renda fixa vs. renda variável", "body": ["Renda fixa: retorno mais previsível, risco geralmente menor. Renda variável: potencial de retorno maior, mas com oscilações e risco maior. A escolha depende do seu objetivo, prazo e tolerância a risco."]}, {"title": "21.3 Perfil de investidor e diversificação", "body": ["Seu perfil (conservador, moderado, arrojado) deve guiar a proporção entre os tipos de investimento. Diversificar (não colocar tudo em um único lugar) reduz o impacto de qualquer perda isolada."]}, {"title": "21.4 Erros comuns de iniciantes", "body": ["Investir sem reserva de emergência, seguir \"dicas quentes\" sem entender o produto, tentar acertar o momento perfeito do mercado, e não diversificar."]}, {"title": "21.5 Investindo em si mesmo", "body": ["Cursos, livros, mentorias e experiências que aumentam sua capacidade de gerar renda costumam ter o retorno mais alto de todos os investimentos possíveis, especialmente no início da jornada."]}], "estudo_caso": "Duas pessoas com o mesmo valor para investir: uma seguiu uma \"dica\" de conhecido sem entender o produto e perdeu dinheiro; a outra estudou o básico de renda fixa e variável antes de decidir, diversificou, e teve resultado consistente ao longo dos anos.", "exercicios": ["Defina seu perfil de investidor (conservador, moderado, arrojado) com justificativa.", "Pesquise um tipo de investimento de renda fixa disponível para você e explique como funciona.", "Liste um investimento em você mesmo que traria retorno alto nos próximos 12 meses."], "checklist": ["Entendo a diferença entre renda fixa e variável", "Defini meu perfil de investidor", "Tenho reserva de emergência antes de investir em risco"], "resumo": "Investir bem começa por entender o que você está comprando, alinhar ao seu perfil e prazo, e nunca pular a reserva de emergência.", "desafio_label": "Desafio semanal", "desafio": "Pesquise e entenda profundamente um único tipo de investimento antes de considerar aplicar nele.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b4_m2", "title": "MÓDULO 22 — ERROS FINANCEIROS", "objetivo": "reconhecer e evitar os erros financeiros mais comuns e caros.", "lessons": [{"title": "22.1 Erros mais comuns e caros", "body": ["Gastar mais do que ganha, não ter reserva de emergência, financiar itens que perdem valor rápido, não acompanhar para onde o dinheiro vai."]}, {"title": "22.2 Dívida boa vs. dívida ruim", "body": ["Dívida \"boa\" financia algo que gera retorno maior que o custo dos juros (ex: educação que aumenta sua renda). Dívida \"ruim\" financia consumo que perde valor e não gera retorno (ex: parcelar itens supérfluos em juros altos)."]}, {"title": "22.3 Armadilhas do consumismo", "body": ["Comprar para preencher vazios emocionais, comparação social constante, parcelamento que esconde o custo real total."]}, {"title": "22.4 Como se recuperar de um erro financeiro grave", "body": ["Pare de piorar (corte a causa), mapeie o tamanho real do problema, negocie o que for possível, e construa um plano realista de saída — vergonha não paga dívida, plano paga."]}], "estudo_caso": "Uma pessoa acumulou dívidas de cartão parcelando compras por impulso. Ao mapear o problema (em vez de evitar olhar), negociar as dívidas e cortar o gatilho do consumo por impulso, conseguiu quitar tudo em menos tempo do que imaginava.", "exercicios": ["Liste seus 3 maiores erros financeiros do passado.", "Para cada um, identifique o gatilho por trás (do Módulo 19).", "Se tiver dívidas hoje, mapeie o valor total real e um primeiro passo de negociação."], "checklist": ["Sei diferenciar dívida boa de dívida ruim", "Identifiquei meus erros financeiros recorrentes", "Tenho um plano (ou já não tenho dívidas problemáticas)"], "resumo": "Erros financeiros se repetem quando o gatilho emocional por trás deles não é identificado — mapear é o primeiro passo para parar de repeti-los.", "desafio_label": "Desafio semanal", "desafio": "Mapeie com números reais (não estimativas) sua situação de dívida atual, se houver.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b4_m3", "title": "MÓDULO 23 — PSICOLOGIA DO CONSUMO", "objetivo": "entender por que compramos o que compramos, e recuperar o controle consciente sobre isso.", "lessons": [{"title": "23.1 Por que compramos o que não precisamos", "body": ["Grande parte do consumo é movido por emoção (status, pertencimento, alívio momentâneo), não por necessidade real — e o marketing é desenhado para explorar exatamente isso."]}, {"title": "23.2 Gatilhos usados pelo marketing", "body": ["Urgência artificial, comparação social, \"recompensa você merece\", prova social fabricada. Reconhecer esses gatilhos quando alguém os usa em você é uma defesa poderosa."]}, {"title": "23.3 Consumo consciente sem radicalismo", "body": ["O objetivo não é parar de gastar — é gastar de forma alinhada com o que realmente importa para você, sem culpa nem impulso."]}, {"title": "23.4 Alinhando gastos com valores pessoais", "body": ["Antes de uma compra não essencial, pergunte: isso está alinhado com o que eu disse que importa pra mim, ou é só reação a um gatilho externo?"]}], "estudo_caso": "Uma pessoa percebeu que comprava roupas novas toda vez que se sentia insegura em situações sociais. Ao identificar esse padrão, passou a esperar 48h antes de qualquer compra não planejada — reduzindo drasticamente compras por impulso.", "exercicios": ["Identifique uma compra recente que foi puramente emocional.", "Liste 3 gatilhos de marketing que mais funcionam em você.", "Defina uma regra pessoal (ex: esperar 48h) antes de compras não planejadas."], "checklist": ["Reconheço gatilhos emocionais por trás do meu consumo", "Sei identificar táticas de marketing usadas em mim", "Tenho uma regra pessoal para compras por impulso"], "resumo": "Consumo consciente não é privação — é decidir com clareza, em vez de reagir a gatilhos emocionais e táticas de marketing.", "desafio_label": "Desafio semanal", "desafio": "Aplique a regra das 48h em toda compra não planejada esta semana.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b4_m4", "title": "MÓDULO 24 — IMPOSTOS BÁSICOS", "objetivo": "entender o essencial sobre impostos para autônomos e pequenos negócios, sem virar contador.", "lessons": [{"title": "24.1 Por que entender impostos é inteligência financeira", "body": ["Ignorar impostos gera problemas legais e financeiros mais tarde. Entender o básico evita surpresas e permite planejar sua renda líquida real."]}, {"title": "24.2 Conceitos essenciais para autônomos e pequenos negócios", "body": ["Diferença entre renda bruta e líquida, obrigações de declaração, formas de formalização (que variam por país/região) e por que guardar comprovantes de tudo importa."]}, {"title": "24.3 Erros comuns que geram problemas com o fisco", "body": ["Misturar finanças pessoais com as do negócio, não guardar comprovantes, não declarar renda de fontes variadas, deixar tudo para o último momento."]}, {"title": "24.4 Quando buscar ajuda profissional", "body": ["Assim que sua renda ou complexidade financeira cresce, o custo de um contador costuma ser muito menor que o risco de erros ou multas — n ruiu", "body": ["Reserva de segurança, diversificação e evitar riscos desnecessários (como comprometer todo patrimônio em uma única aposta) protegem o que levou anos para construir."]}], "estudo_caso": "Duas pessoas com renda mensal parecida: uma aumenta o padrão de vida a cada aumento de salário; a outra mantém o padrão e reinveste o excedente. Em 10 anos, apesar da renda \"parecida\" ao longo do caminho, o patrimônio das duas é radicalmente diferente.", "exercicios": ["Calcule seu patrimônio líquido atual (o que você possui menos o que deve).", "Defina um percentual da sua renda que será reinvestido a partir de agora, antes de qualquer novo gasto de padrão de vida."], "checklist": ["Sei calcular meu patrimônio líquido", "Entendo a diferença entre aumentar renda e aumentar patrimônio", "Defini um percentual de reinvestimento"], "resumo": "Patrimônio, não renda, é o verdadeiro indicador de riqueza de longo prazo — e ele cresce através de reinvestimento consistente, não de aumento de padrão de vida.", "desafio_label": "Desafio semanal", "desafio": "Calcule seu patrimônio líquido atual, com números reais.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b5_m2", "title": "MÓDULO 27 — LIBERDADE FINANCEIRA", "objetivo": "definir, de forma pessoal e concreta, o que liberdade financeira significa para você.", "lessons": [{"title": "27.1 Definindo liberdade financeira para você", "body": ["Não existe um número universal — para uns é não depender de emprego, para outros é ter opções, para outros é trabalhar por escolha, não por necessidade. Defina o seu significado antes de perseguir o de outra pessoa."]}, {"title": "27.2 Número de liberdade", "body": ["Estimar quanto de patrimônio ou renda passiva seria necessário para cobrir suas despesas essenciais (ou desejadas) sem depender de trabalho ativo — mesmo que seja uma estimativa inicial, dá direção."]}, {"title": "27.3 Estilos de vida e liberdade", "body": ["Liberdade financeira não é necessariamente parar de trabalhar — muitas vezes é poder escolher como, quando e com quem trabalhar."]}, {"title": "27.4 Mantendo a liberdade no longo prazo", "body": ["Liberdade conquistada pode ser perdida com gestão descuidada. Manter os princípios de planejamento, reserva e diversificação continua importando mesmo depois de \"chegar lá\"."]}], "estudo_caso": "Uma pessoa alcançou patrimônio suficiente para parar de trabalhar, mas continuou atuando — porque descobriu que sua liberdade real era poder escolher projetos, não parar de produzir.", "exercicios": ["Escreva sua definição pessoal de liberdade financeira, sem copiar a de ninguém.", "Faça uma estimativa inicial do seu \"número de liberdade\", com base nas suas despesas essenciais."], "checklist": ["Tenho minha própria definição de liberdade financeira", "Fiz uma estimativa inicial do meu número de liberdade", "Entendo que liberdade exige manutenção, não é um destino final estático"], "resumo": "Liberdade financeira é pessoal, não universal — defina a sua, estime seu número, e entenda que ela precisa ser mantida, não só alcançada.", "desafio_label": "Desafio semanal", "desafio": "Compartilhe (com alguém de confiança, ou por escrito) sua definição pessoal de liberdade financeira.", "perguntas_label": "Perguntas de reflexão", "perguntas": [], "glossario": []}, {"id": "b5_m3", "title": "MÓDULO 28 — PLANO DE AÇÃO DE 12 MESES", "objetivo": "transformar tudo o que foi aprendido em um plano prático, com prazos e responsabilidade concreta.", "lessons": [{"title": "28.1 Diagnóstico do seu ponto de partida", "body": ["Reúna o que você já mapeou nos módulos anteriores: patrimônio líquido, fluxo de caixa, crenças identificadas, habilidades e modelo de renda escolhido."]}, {"title": "28.2 Definindo metas trimestrais realistas", "body": ["Divida o ano em 4 trimestres, com uma meta principal por trimestre (ex: trimestre 1 — validar oferta; trimestre 2 — primeiros clientes consistentes; trimestre 3 — sistematizar; trimestre 4 — escalar/reinvestir)."]}, {"title": "28.3 Cronograma mês a mês", "body": ["Para cada mês, defina 1-3 ações concretas que empurram a meta trimestral, evitando dispersão em múltiplas frentes ao mesmo tempo."]}, {"title": "28.4 Sistema de acompanhamento e ajuste", "body": ["Reserve um momento fixo mensal para revisar o progresso, ajustar o que não está funcionando e comemorar o que está."]}], "estudo_caso": "Uma pessoa que terminou um curso similar sem plano de ação concreto voltou aos velhos hábitos em semanas. Outra, que transformou o aprendizado em um cronograma trimestral com revisões mensais, manteve consistência e viu resultado real em 12 meses.", "exercicios": ["Defina sua meta principal para cada um dos 4 trimestres do próximo ano.", "Para o primeiro mês, liste de 1 a 3 ações concretas e específicas.", "Marque, desde já, uma data fixa mensal de revisão do seu progresso."], "checklist": ["Tenho metas trimestrais definidas", "Tenho ações concretas para o primeiro mês", "Marquei minha primeira data de revisão mensal"], "resumo": "Todo o curso só se torna resultado real através de um plano de ação concreto, com prazos, revisão e ajuste constante — conhecimento sem execução não muda sua vida financeira.", "desafio_label": "Desafio final", "desafio": "Execute a primeira ação do seu plano de 12 meses ainda esta semana — não espere o momento perfeito.", "perguntas_label": "Perguntas de reflexão finais", "perguntas": ["O que mudou na minha forma de pensar sobre dinheiro desde o Módulo 1?", "Qual é o primeiro passo real, concreto, que vou dar hoje?"], "glossario": []}]}]</script>
<script>
const COURSE = JSON.parse(document.getElementById('course-data').textContent);
const BLOCO_ICONS = ["<circle cx=\"9\" cy=\"7\" r=\"3\"/><circle cx=\"15\" cy=\"6\" r=\"3\"/><circle cx=\"18\" cy=\"12\" r=\"3\"/><circle cx=\"14\" cy=\"17\" r=\"3\"/><circle cx=\"7\" cy=\"16\" r=\"3\"/><circle cx=\"5\" cy=\"10\" r=\"3\"/>", "<path d=\"M12 3 L4 12 L12 21 L20 12 Z\"/><path d=\"M4 12 L20 12\"/>", "<path d=\"M3 10v4h3l6 4V6l-6 4H3z\"/><path d=\"M15 9a4 4 0 010 6\"/>", "<circle cx=\"12\" cy=\"12\" r=\"3\"/><path d=\"M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1\"/>", "<rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"1\"/><circle cx=\"12\" cy=\"12\" r=\"4\"/><circle cx=\"12\" cy=\"12\" r=\"0.7\" fill=\"currentColor\"/>", "<path d=\"M4 20 L14 4 L20 8 L10 20 Z\"/>"];
const ALL_MODULES = [];
COURSE.forEach((b,bi)=>b.modulos.forEach((m,mi)=>ALL_MODULES.push({...m, bIdx:bi, mIdx:mi, bTitle:b.title})));

let currentIdx = 0;
const checklistCache = {}; // id -> array of booleans, loaded lazily

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function mdInline(text){
  let t = esc(text||'');
  t = t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  return t;
}

async function storageGet(key){
  try{
    const r = await window.storage.get(key, false);
    return r ? r.value : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  try{ await window.storage.set(key, value, false); return true; }
  catch(e){ return false; }
}

function flash(el){
  if(!el) return;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 1400);
}

function debounce(fn, ms){
  let t;
  return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}

function renderSidebar(){
  const nav = document.getElementById('nav-list');
  nav.innerHTML = '';
  COURSE.forEach((b, bi)=>{
    const group = document.createElement('div');
    group.className = 'bloco-group';
    const titleEl = document.createElement('div');
    titleEl.className = 'bloco-title';
    titleEl.innerHTML = `<svg viewBox="0 0 24 24">${BLOCO_ICONS[bi]||''}</svg><span>${esc(b.title)}</span>`;
    group.appendChild(titleEl);
    b.modulos.forEach((m, mi)=>{
      const idx = ALL_MODULES.findIndex(x=>x.id===m.id);
      const item = document.createElement('div');
      item.className = 'mod-item' + (idx===currentIdx?' active':'');
      item.dataset.idx = idx;
      item.innerHTML = `<span class="mod-dot" id="dot-${m.id}"></span><span>${esc(m.title.replace(/^MÓDULO\s*\d+\s*—\s*/i,''))}</span>`;
      item.addEventListener('click', ()=>{ currentIdx = idx; renderAll(); window.scrollTo(0,0); });
      group.appendChild(item);
    });
    nav.appendChild(group);
  });
}

async function computeModuleDone(m){
  const total = m.checklist.length;
  if(total===0) return null;
  let done = 0;
  for(let i=0;i<total;i++){
    const v = await storageGet(`chk_${m.id}_${i}`);
    if(v === '1') done++;
  }
  return {done, total};
}

async function refreshProgress(){
  let totalItems = 0, doneItems = 0;
  for(const m of ALL_MODULES){
    for(let i=0;i<m.checklist.length;i++){
      totalItems++;
      const v = await storageGet(`chk_${m.id}_${i}`);
      if(v==='1') doneItems++;
    }
    const dot = document.getElementById(`dot-${m.id}`);
    if(dot){
      const r = await computeModuleDone(m);
      if(r && r.total>0){
        dot.classList.toggle('done', r.done===r.total);
      }
    }
  }
  const pct = totalItems ? Math.round(100*doneItems/totalItems) : 0;
  document.getElementById('progress-bar-fill').style.width = pct+'%';
  document.getElementById('progress-pct').textContent = pct+'%';
}

function box(cls, label, innerHtml){
  return `<div class="box ${cls}"><div class="box-label">${label}</div>${innerHtml}</div>`;
}

async function renderModule(){
  const m = ALL_MODULES[currentIdx];
  const wrap = document.getElementById('content-inner');
  let h = '';
  h += `<div class="eyebrow">${esc(m.bTitle)}</div>`;
  h += `<h1 class="mod-h">${esc(m.title)}</h1>`;

  if(m.objetivo){
    h += box('gold','🎯 Objetivo do módulo', `<p>${mdInline(m.objetivo)}</p>`);
  }

  m.lessons.forEach(lesson=>{
    h += `<h2 class="lesson-h">${esc(lesson.title)}</h2>`;
    lesson.body.forEach(line=>{ h += `<p class="body-p">${mdInline(line)}</p>`; });
  });

  if(m.estudo_caso){
    h += box('navy','📘 Estudo de caso', `<p>${mdInline(m.estudo_caso)}</p>`);
  }

  if(m.exercicios.length){
    let inner = '';
    m.exercicios.forEach((ex,i)=>{
      inner += `<div class="q-item">
        <div class="q-text">${i+1}. ${mdInline(ex)}</div>
        <textarea class="answer" data-key="ans_${m.id}_${i}" placeholder="Escreva sua resposta aqui..."></textarea>
        <span class="save-status" data-for="ans_${m.id}_${i}">Salvo ✓</span>
      </div>`;
    });
    h += box('gold','📝 Exercícios — responda abaixo', inner);
  }

  if(m.checklist.length){
    let inner = '';
    m.checklist.forEach((c,i)=>{
      inner += `<label class="chk-item" data-key="chk_${m.id}_${i}">
        <input type="checkbox" data-key="chk_${m.id}_${i}"><span>${mdInline(c)}</span>
      </label>`;
    });
    h += box('teal','✅ Checklist do módulo', inner);
  }

  if(m.resumo){
    h += box('teal','🧭 Resumo', `<p>${mdInline(m.resumo)}</p>`);
  }

  if(m.desafio){
    h += box('orange', '🔥 ' + esc(m.desafio_label), `<p>${mdInline(m.desafio)}</p>
      <div class="q-item">
        <div class="q-text">Como foi cumprir esse desafio? (opcional)</div>
        <textarea class="answer" data-key="desafio_${m.id}" placeholder="Registre aqui como foi..."></textarea>
        <span class="save-status" data-for="desafio_${m.id}">Salvo ✓</span>
      </div>`);
  }

  if(m.perguntas.length){
    let inner = '';
    m.perguntas.forEach((p,i)=>{
      inner += `<div class="q-item">
        <div class="q-text">${i+1}. ${mdInline(p)}</div>
        <textarea class="answer" data-key="refl_${m.id}_${i}" placeholder="Escreva sua reflexão..."></textarea>
        <span class="save-status" data-for="refl_${m.id}_${i}">Salvo ✓</span>
      </div>`;
    });
    h += box('navy', '💬 ' + esc(m.perguntas_label), inner);
  }

  if(m.glossario.length){
    let rows = m.glossario.map(g=>`<tr><td><strong>${esc(g.term)}</strong></td><td>${mdInline(g.def)}</td></tr>`).join('');
    h += `<div style="margin-top:22px;">
      <div class="box-label" style="color:var(--navy);">📖 Mini-glossário</div>
      <table class="gloss"><tr><th>Termo</th><th>Definição</th></tr>${rows}</table>
    </div>`;
  }

  h += `<div class="nav-btns">
    <button class="nav-btn" id="btn-prev" ${currentIdx===0?'disabled':''}>← Módulo anterior</button>
    <button class="nav-btn" id="btn-next" ${currentIdx===ALL_MODULES.length-1?'disabled':''}>Próximo módulo →</button>
  </div>`;

  wrap.innerHTML = h;

  document.getElementById('btn-prev')?.addEventListener('click', ()=>{ if(currentIdx>0){currentIdx--; renderAll(); window.scrollTo(0,0);} });
  document.getElementById('btn-next')?.addEventListener('click', ()=>{ if(currentIdx<ALL_MODULES.length-1){currentIdx++; renderAll(); window.scrollTo(0,0);} });

  // hydrate textareas
  wrap.querySelectorAll('textarea.answer').forEach(async ta=>{
    const key = ta.dataset.key;
    const val = await storageGet(key);
    if(val) ta.value = val;
    const statusEl = wrap.querySelector(`.save-status[data-for="${key}"]`);
    const doSave = debounce(async ()=>{
      await storageSet(key, ta.value);
      flash(statusEl);
    }, 600);
    ta.addEventListener('input', doSave);
  });

  // hydrate checkboxes
  wrap.querySelectorAll('input[type=checkbox]').forEach(async cb=>{
    const key = cb.dataset.key;
    const val = await storageGet(key);
    const label = cb.closest('.chk-item');
    if(val === '1'){ cb.checked = true; label.classList.add('checked'); }
    cb.addEventListener('change', async ()=>{
      label.classList.toggle('checked', cb.checked);
      await storageSet(key, cb.checked ? '1' : '0');
      refreshProgress();
    });
  });
}

function renderAll(){
  renderSidebar();
  renderModule();
  refreshProgress();
}

renderAll();
</script>
</body>
</html>
